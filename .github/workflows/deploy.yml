name: Deploy SvelteKit (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # 1. プロジェクトディレクトリへ移動
          cd /opt/tohofes2026-web
          
          # 1. GitHubから最新情報を取ってくる（まだ合体させない）
          git fetch origin main
          
          # 2. 【重要】サーバー側の変更をすべて捨てて、GitHubの最新状態に強制一致させる
          git reset --hard origin/main
          
          # 3. 依存関係のインストールとビルド
          npm install
          npm run build
          
          # 4. PM2で再起動（反映）
          pm2 restart tf26-dweb01 || pm2 start build/index.js --name tf26-dweb01